name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE_TAG_BASE: quay.io/redhat-consulting-services/multi-tenant-operator

jobs:
  release:
    name: Build and Push Operator and Bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone the code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_IO_USERNAME }}
          password: ${{ secrets.QUAY_IO_PASSWORD }}

      # operator image
      - name: Build operator image
        run: |
          make docker-build \
            IMG=${{ env.IMAGE_TAG_BASE }}:v${{ steps.version.outputs.VERSION }}

      - name: Push operator image (versioned tag)
        run: |
          make docker-push \
            IMG=${{ env.IMAGE_TAG_BASE }}:v${{ steps.version.outputs.VERSION }}

      - name: Tag and push operator image as latest
        run: |
          docker tag \
            ${{ env.IMAGE_TAG_BASE }}:v${{ steps.version.outputs.VERSION }} \
            ${{ env.IMAGE_TAG_BASE }}:latest
          docker push ${{ env.IMAGE_TAG_BASE }}:latest

      # operator bundle image
      - name: Generate bundle manifests and metadata
        run: |
          make bundle \
            VERSION=${{ steps.version.outputs.VERSION }} \
            IMG=${{ env.IMAGE_TAG_BASE }}:v${{ steps.version.outputs.VERSION }} \
            IMAGE_TAG_BASE=${{ env.IMAGE_TAG_BASE }}

      - name: Build bundle image
        run: |
          make bundle-build \
            BUNDLE_IMG=${{ env.IMAGE_TAG_BASE }}-bundle:v${{ steps.version.outputs.VERSION }}

      - name: Push bundle image
        run: |
          make bundle-push \
            BUNDLE_IMG=${{ env.IMAGE_TAG_BASE }}-bundle:v${{ steps.version.outputs.VERSION }}

          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: MultiTenantConfigSpec defines the desired state of MultiTenantConfig.
            properties:
              argocd:
                description: ArgoCD contains the configuration for Argo CD integration
                  in the multi-tenant environment.
                properties:
                  instanceName:
                    default: openshift-gitops
                    description: InstanceName is the name of the Argo CD instance.
                      If not specified, it defaults to "openshift-gitops".
                    type: string
                  instanceNamespace:
                    default: openshift-gitops
                    description: InstanceNamespace is the namespace where the Argo
                      CD instance is installed. If not specified, it defaults to "openshift-gitops".
                    type: string
                  project:
                    description: Project contains the Argo CD project configuration

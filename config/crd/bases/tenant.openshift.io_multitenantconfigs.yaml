                        type: object
                      permitOnlyProjectScopedClusters:
                        description: PermitOnlyProjectScopedClusters determines whether
                          destinations can only reference clusters which are project-scoped
                        type: boolean
                      roles:
                        description: Roles are user defined RBAC roles associated
                          with this project
                        items:
                          description: ProjectRole represents a role that has access
                            to a project
                          properties:
                            description:
                              description: Description is a description of the role
                              type: string
                            groups:
                              description: Groups are a list of OIDC group claims

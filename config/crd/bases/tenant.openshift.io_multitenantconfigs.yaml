                          properties:
                            group:
                              type: string
                            kind:
                              type: string
                          required:
                          - group
                          - kind
                          type: object
                        type: array
                      namespaceResourceWhitelist:
                        description: NamespaceResourceWhitelist contains list of whitelisted

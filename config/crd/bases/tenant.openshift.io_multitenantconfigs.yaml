                        items:
                          description: ClusterResourceRestrictionItem is a cluster
                            resource that is restricted by the project's whitelist
                            or blacklist
                          properties:
                            group:
                              type: string
                            kind:
                              type: string
                            name:
                              description: |-
                                Name is the name of the restricted resource. Glob patterns using Go's filepath.Match syntax are supported.
                                Unlike the group and kind fields, if no name is specified, all resources of the specified group/kind are matched.
                              type: string
                          required:
                          - group
                          - kind
                          type: object
                        type: array
                      clusterResourceWhitelist:
                        description: ClusterResourceWhitelist contains list of whitelisted

                        maxLength: 255
                        type: string
                      destinationServiceAccounts:
                        description: DestinationServiceAccounts holds information
                          about the service accounts to be impersonated for the application
                          sync operation for each destination.
                        items:
                          description: ApplicationDestinationServiceAccount holds
                            information about the service account to be impersonated
                            for the application sync operation.
                          properties:
                            defaultServiceAccount:
                              description: DefaultServiceAccount to be used for impersonation
                                during the sync operation

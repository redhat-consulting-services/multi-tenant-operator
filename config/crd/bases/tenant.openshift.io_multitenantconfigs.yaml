                                properties:
                                  exp:
                                    format: int64
                                    type: integer
                                  iat:
                                    format: int64
                                    type: integer
                                  id:
                                    type: string
                                required:
                                - iat
                                type: object
                              type: array
                            name:
                              description: Name is a name for this role
                              type: string
                            policies:
                              description: Policies Stores a list of casbin formatted
                                strings that define access policies for the role in

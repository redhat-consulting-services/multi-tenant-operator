                          type: string
                        kind:
                          description: Kind is the type of resource being referenced
                          type: string
                        name:
                          description: Name is the name of resource being referenced
                          type: string
                      required:
                      - apiGroup
                      - kind
                      - name
                      type: object
                      x-kubernetes-map-type: atomic
                    subjects:
                      items:
                        description: |-
                          Subject contains a reference to the object or user identities a role binding applies to.  This can either hold a direct API object reference,
                          or a value for non-objects such as user and group names.
                        properties:
                          apiGroup:
                            description: |-
                              APIGroup holds the API group of the referenced subject.
                              Defaults to "" for ServiceAccount subjects.
                              Defaults to "rbac.authorization.k8s.io" for User and Group subjects.
                            type: string
                          kind:
                            description: |-
                              Kind of object being referenced. Values defined by this API group are "User", "Group", and "ServiceAccount".
                              If the Authorizer does not recognized the kind value, the Authorizer should report an error.
                            type: string
                          name:
                            description: Name of the object being referenced.
                            type: string
                          namespace:
                            description: |-
                              Namespace of the referenced object.  If the object kind is non-namespace, such as "User" or "Group", and this value is not empty
                              the Authorizer should report an error.
                            type: string
                        required:
                        - kind
                        - name
                        type: object
                        x-kubernetes-map-type: atomic
                      type: array
                  type: object
                type: array
            type: object
          status:
            description: MultiTenantConfigStatus defines the observed state of MultiTenantConfig.
            properties:
              limitRangeReference:
                description: LimitRangeReference is the name of the NamespaceLimitRange
                  resource currently applied to tenant namespaces.
                type: string
              managedNamespaceCount:
                description: ManagedNamespaceCount is the number of namespaces currently
                  managed by this MultiTenantConfig.
                type: integer
              quotaReference:
                description: QuotaReference is the name of the NamespaceResourceQuota
                  resource currently applied to tenant namespaces.
                type: string
            type: object

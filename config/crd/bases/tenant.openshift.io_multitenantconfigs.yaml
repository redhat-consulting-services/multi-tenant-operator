  name: multitenantconfigs.tenant.openshift.io
spec:
  group: tenant.openshift.io
  names:
    kind: MultiTenantConfig
    listKind: MultiTenantConfigList
    plural: multitenantconfigs
    shortNames:
    - mtc
    singular: multitenantconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.managedNamespaceCount
      name: Managed Namespaces
      type: integer
    - jsonPath: .status.quotaReference
      name: Quota Reference
      type: string

                              items:
                                type: string
                              type: array
                            clusters:
                              description: Clusters contains a list of clusters that
                                the window will apply to
                              items:
                                type: string
                              type: array
                            description:
                              description: Description of the sync that will be applied
                                to the schedule, can be used to add any information
                                such as a ticket number for example
                              type: string
                            duration:
                              description: Duration is the amount of time the sync
                                window will be open
                              type: string
                            kind:
                              description: Kind defines if the window allows or blocks

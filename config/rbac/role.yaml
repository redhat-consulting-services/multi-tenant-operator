---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespacelimitranges
  - namespaceresourcequotas
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespacelimitranges/finalizers
  - namespaceresourcequotas/finalizers
  verbs:
  - update
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespacelimitranges/status
  - namespaceresourcequotas/status
  verbs:
  - get
  - patch
  - update

# This rule is not used by the project multi-tenant-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the tenantconfig.openshift.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: multi-tenant-operator
    app.kubernetes.io/managed-by: kustomize
  name: namespaceresourcequota-editor-role
rules:
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespaceresourcequotas
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespaceresourcequotas/status
  verbs:
  - get

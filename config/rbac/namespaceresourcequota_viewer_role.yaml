# This rule is not used by the project multi-tenant-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to tenantconfig.openshift.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: multi-tenant-operator
    app.kubernetes.io/managed-by: kustomize
  name: namespaceresourcequota-viewer-role
rules:
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespaceresourcequotas
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespaceresourcequotas/status
  verbs:
  - get

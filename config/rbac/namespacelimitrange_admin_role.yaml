# This rule is not used by the project multi-tenant-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over tenantconfig.openshift.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: multi-tenant-operator
    app.kubernetes.io/managed-by: kustomize
  name: namespacelimitrange-admin-role
rules:
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespacelimitranges
  verbs:
  - '*'
- apiGroups:
  - tenantconfig.openshift.io
  resources:
  - namespacelimitranges/status
  verbs:
  - get
